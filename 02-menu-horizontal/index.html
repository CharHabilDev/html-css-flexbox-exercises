<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice - 02 Menu horizontal</title>

    <style>
        body{
            margin: 0;
            min-height: 100vh;
            background-color: gray;
        }

        nav{
            background-color: lightblue;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Services</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
    </nav>
</body>
</html>
