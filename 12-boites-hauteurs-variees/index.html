<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice - 12 Tableau de boîtes avec hauteurs variées</title>

    <style>
        body{
            margin: 0;
            padding: 10px;
            background-color: gray;
        }

        section{
            margin-bottom: 30px;
            padding: 10px;
            background-color: lightblue;
        }


        .container{
            height: 400px;
            border: 2px solid;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item{
            width: 100px;
            border: 1px solid black;
            text-align: center;
            padding: 10px;
            background-color: white;
        }

        .petit{
            min-height: 60px;
        }

        .moyen{
            min-height: 100px;
        }

        .grand{
            min-height: 140px;
        }

        .stretch{
            align-items: stretch;
        }

        .center{
            align-items: center;
        }

        .start{
            align-items: flex-start;
        }
    </style>
</head>
<body>
    <section>
        <h2>align-items: stretch</h2>
        <div class="container stretch">
            <div class="item petit">1</div>
            <div class="item grand">2</div>
            <div class="item moyen">3</div>
            <div class="item petit">4</div>
            <div class="item grand">5</div>
            <div class="item moyen">6</div>
        </div>
    </section>

    <section>
        <h2>align-items: center</h2>
        <div class="container center">
            <div class="item petit">1</div>
            <div class="item grand">2</div>
            <div class="item moyen">3</div>
            <div class="item petit">4</div>
            <div class="item grand">5</div>
            <div class="item moyen">6</div>
        </div>
    </section>

    <section>
        <h2>align-items: flex-start</h2>
        <div class="container start">
            <div class="item petit">1</div>
            <div class="item grand">2</div>
            <div class="item moyen">3</div>
            <div class="item petit">4</div>
            <div class="item grand">5</div>
            <div class="item moyen">6</div>
        </div>
    </section>   
</body>
</html>
