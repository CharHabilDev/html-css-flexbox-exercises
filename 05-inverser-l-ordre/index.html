<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice - 05 Inverser l'ordre des éléments</title>

    <style>
        body{
            margin: 0;
            padding: 20px;
            background-color: gray;
        }

        section{
            margin-bottom: 30px;
            padding: 20px;
        }

        .horizontale{
            background-color: lightcyan;
        }

        .verticale{
            background-color: lightblue;
        }

        .verticale .container{
            min-height: 250px;
        }

        .container{
            padding: 20px;  
            margin-bottom: 20px;
            border: 1px solid black;    
            display: flex;
        }

        .container div{
            width: 50px;
            text-align: center;
            margin: 5px;
            padding: 10px;
            border: 2px solid black;
        }

        .row {
            flex-direction: row;
        }

        .row-reverse{
            flex-direction: row-reverse;
        }

        .column{
            flex-direction: column;
        }

        .column-reverse{
            flex-direction: column-reverse;
        }

    </style>
</head>
<body>
    <section class="horizontale">
        <h2>Horizontal</h2>

        <h3>row</h3>
        <div class="container row">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>

        <h3>row-reverse</h3>
        <div class="container row-reverse">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
    </section>

    <section class="verticale">
        <h2>Vertical</h2>

        <h3>column</h3>
        <div class="container column">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>

        <h3>column-reverse</h3>
        <div class="container column-reverse">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
    </section>
</body>
</html>
