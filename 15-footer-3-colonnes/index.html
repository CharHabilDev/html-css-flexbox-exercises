<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice - 15 Footer en 3 colonnes</title>

    <style>
        body{
            margin: 0;
            padding: 10px;
            background-color: gray;
        }

        footer{
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background-color: lightblue;
        }

        .column{
            flex: 1;
            text-align: center;
            padding: 0 8px;
        }

        .column a {
            display: block;
            color: black;
            text-decoration: none;
            margin-bottom: 6px;
        }

        @media (max-width: 600px) {
            footer{
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .column{
                flex: unset;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <footer class="footer">
        <div class="column">
            <h2>Logo</h2>
            <p>Petit texte de présentation du site ou de l’entreprise.</p>
        </div>

        <div class="column">
            <h2>Liens</h2>
            <a href="#">Accueil</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>

        <div class="column">
            <h2>Réseaux sociaux</h2>
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
        </div>
    </footer>
</body>
</html>
