<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice - 04 Colonne verticale</title>

    <style>
        body{
            margin: 0;
            min-height: 100vh;
            background-color: gray;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 250px;
            padding: 20px;
            background-color: lightblue;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .card h1,
        .card p {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Titre</h1>
        <p>Paragraphe</p>
        <button>Bouton</button>
    </div>
</body>
</html>
